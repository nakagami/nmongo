# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: MicroPython package

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@1.3.0
      with:
        mongodb-version: 3.6
    - name: Cache MicroPython build
      id: cache-micropython
      uses: actions/cache@v3
      with:
        path: /tmp/micropython-build
        key: micropython-v1.24.0-${{ runner.os }}
    - name: Build MicroPython from source
      if: steps.cache-micropython.outputs.cache-hit != 'true'
      run: |
        sudo apt-get install -y build-essential libffi-dev pkg-config
        git clone --depth 1 --branch v1.24.0 https://github.com/micropython/micropython.git /tmp/micropython-build
        cd /tmp/micropython-build
        make -C mpy-cross -j$(nproc)
        make -C ports/unix submodules
        make -C ports/unix -j$(nproc)
    - name: Install MicroPython
      run: |
        sudo install -m755 /tmp/micropython-build/ports/unix/build-standard/micropython /usr/local/bin/micropython
        micropython --version
    - name: Install MicroPython packages
      run: |
        micropython -c "import mip; mip.install('datetime')"
        micropython -c "import mip; mip.install('time')"
        micropython -c "import mip; mip.install('unittest')"
        micropython -c "import mip; mip.install('ssl')"
    - name: Test with MicroPython (MongoDB)
      run: |
        micropython test_nmongo.py
    - name: Start DocumentDB
      run: |
        docker run -d -p 10260:10260 --name documentdb-container \
          ghcr.io/documentdb/documentdb/documentdb-local:latest \
          --username testuser --password testpassword
        sleep 15
    - name: Test with MicroPython (DocumentDB)
      env:
        DOCUMENTDB_USER: testuser
        DOCUMENTDB_PASSWORD: testpassword
      run: |
        micropython test_documentdb.py
